<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Cyan Hold v13.1 Adaptive Cell Radius</title>
<style>
:root{--panel:rgba(8,12,20,.68);--text:#eef4ff;--muted:#c6d2ea;--good:#89ffb3;--warn:#ffd166;--bad:#ff8e8e;--accent:#7cecff;--lock:#ffb3e1}
*{box-sizing:border-box} html,body{margin:0;height:100%;background:#000;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)} body{overflow:hidden}
.app{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#video{background:#000} #overlay{pointer-events:auto}
#freezeView{position:absolute;inset:0;z-index:8;opacity:0;pointer-events:none;transition:opacity .08s ease;background:#000}
#freezeView.active{opacity:1} #freezeCanvas{position:absolute;inset:0;width:100%;height:100%}
#freezeBadge{position:absolute;left:12px;right:12px;top:max(70px,calc(env(safe-area-inset-top)+60px));background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 14px;font-weight:800;font-size:18px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#freezeHint{position:absolute;left:50%;bottom:max(110px,calc(env(safe-area-inset-bottom)+90px));transform:translateX(-50%);background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 16px;font-weight:800;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#thumbPreview{position:absolute;right:10px;bottom:max(180px,calc(env(safe-area-inset-bottom)+160px));width:100px;height:146px;border-radius:14px;overflow:hidden;z-index:11;border:2px solid rgba(124,236,255,.65);background:#000}
#thumbCanvas{width:100%;height:100%} #thumbLabel{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);font-size:11px;font-weight:800;text-align:center;padding:4px}
.topbar{position:absolute;left:10px;right:10px;top:max(10px,env(safe-area-inset-top));z-index:10;display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:10px 12px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.title{font-weight:800;font-size:18px}.sub{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.25}
.badge{padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);font-size:13px;font-weight:800;white-space:nowrap}
.controls{position:absolute;left:10px;right:10px;bottom:max(10px,env(safe-area-inset-bottom));z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{appearance:none;border:1px solid rgba(255,255,255,.12);background:rgba(10,14,24,.68);color:var(--text);min-height:48px;border-radius:14px;font-size:16px;font-weight:700;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
button.primary{background:rgba(124,236,255,.18)} button.locked{background:rgba(255,179,225,.16);border-color:rgba(255,179,225,.45)}
.centerLabel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.03em;background:rgba(6,10,18,.68);border:1px solid rgba(124,236,255,.35);color:#dffaff;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>

  <div id="freezeView">
    <canvas id="freezeCanvas"></canvas>
    <div id="freezeBadge">LOCKED IMAGE</div>
    <div id="freezeHint">Tap Unlock image to go back to scanning</div>
  </div>

  <div id="thumbPreview">
    <canvas id="thumbCanvas" width="100" height="146"></canvas>
    <div id="thumbLabel">LAST CAPTURE</div>
  </div>

  <div class="topbar">
    <div>
      <div class="title">Cyan Hold v13.1 Adaptive Cell Radius</div>
      <div class="sub" id="status">Start camera, then tap Set board and tap the top-left and bottom-right corners of the repeater panel once. Each cell now tries multiple circle sizes automatically.</div>
    </div>
    <div class="badge" id="badge">LIVE · 0</div>
  </div>

  <div class="centerLabel" id="centerLabel">START CAMERA</div>

  <div class="controls">
    <button class="primary" id="startBtn">Start camera</button>
    <button id="setBoardBtn">Set board</button>
    <button id="clearBtn">Clear held image</button>
    <button id="lockBtn">Lock image</button>
    <button id="resetBoardBtn">Reset board</button>
    <button id="flipBtn">Flip camera</button>
    <button id="mirrorBtn">Mirror off</button>
  </div>
</div>

<script>
(() => {
  const COLS = 6, ROWS = 5, ACTIVE_MIN = 4, ACTIVE_MAX = 6;
  const BOARD_MARGIN_X = 0.08, BOARD_MARGIN_TOP = 0.18, BOARD_MARGIN_BOTTOM = 0.18, BUFFER_SIZE = 8;

  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d', { alpha:true });
  const freezeView = document.getElementById('freezeView');
  const freezeCanvas = document.getElementById('freezeCanvas');
  const freezeCtx = freezeCanvas.getContext('2d', { alpha:false });
  const freezeBadge = document.getElementById('freezeBadge');
  const thumbCanvas = document.getElementById('thumbCanvas');
  const thumbCtx = thumbCanvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const setBoardBtn = document.getElementById('setBoardBtn');
  const clearBtn = document.getElementById('clearBtn');
  const lockBtn = document.getElementById('lockBtn');
  const resetBoardBtn = document.getElementById('resetBoardBtn');
  const flipBtn = document.getElementById('flipBtn');
  const mirrorBtn = document.getElementById('mirrorBtn');
  const statusEl = document.getElementById('status');
  const badge = document.getElementById('badge');
  const centerLabel = document.getElementById('centerLabel');

  const analysisCanvas = document.createElement('canvas');
  analysisCanvas.width = 420;
  analysisCanvas.height = 240;
  const actx = analysisCanvas.getContext('2d', { alpha:false, willReadFrequently:true });

  const frameBuffer = [];
  let frameBufferIndex = 0;
  let stream = null, rafId = null, facingMode = 'environment', mirror = false;
  let manualLock = false, armed = true, stableHits = 0, hasHeldFrame = false, lastHeldCount = 0;
  let setBoardMode = false, boardTapStage = 0, tapA = null, boardRect = null;

  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  function setStatus(text, color='#c6d2ea'){ statusEl.textContent = text; statusEl.style.color = color; }
  function setBadge(count){ const prefix = manualLock ? 'LOCKED' : (hasHeldFrame ? 'HELD' : 'LIVE'); badge.textContent = prefix + ' · ' + count; badge.style.color = manualLock ? '#ffb3e1' : (hasHeldFrame ? '#9fffb8' : '#dff7ff'); }
  function setMirror(on){ mirror = on; video.style.transform = on ? 'scaleX(-1)' : 'none'; mirrorBtn.textContent = on ? 'Mirror on' : 'Mirror off'; }
  function setManualLock(on){ manualLock = on; lockBtn.textContent = on ? 'Unlock image' : 'Lock image'; lockBtn.classList.toggle('locked', on); freezeView.classList.toggle('active', on); freezeBadge.textContent = on ? `LOCKED IMAGE · ${lastHeldCount} circles` : `LAST GOOD FRAME · ${lastHeldCount} circles`; }

  function resize(){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    overlay.width = Math.round(innerWidth * dpr); overlay.height = Math.round(innerHeight * dpr);
    overlay.style.width = innerWidth + 'px'; overlay.style.height = innerHeight + 'px'; octx.setTransform(dpr, 0, 0, dpr, 0, 0);
    freezeCanvas.width = Math.round(innerWidth * dpr); freezeCanvas.height = Math.round(innerHeight * dpr);
    freezeCanvas.style.width = innerWidth + 'px'; freezeCanvas.style.height = innerHeight + 'px'; freezeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    frameBuffer.length = 0;
    for(let i=0;i<BUFFER_SIZE;i++){ const c=document.createElement('canvas'); c.width=Math.round(innerWidth); c.height=Math.round(innerHeight); frameBuffer.push({canvas:c,ctx:c.getContext('2d',{alpha:false}),count:0,score:0,ts:0}); }
    frameBufferIndex = 0;
    drawOverlay({count:0,cells:[],board:boardRect});
  }

  function drawVideoCover(ctx, canvas, respectMirror){
    const vw = video.videoWidth, vh = video.videoHeight;
    const cw = canvas.width / (window.devicePixelRatio || 1), ch = canvas.height / (window.devicePixelRatio || 1);
    if (!vw || !vh) return;
    const scale = Math.max(cw / vw, ch / vh);
    const dw = vw * scale, dh = vh * scale;
    const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
    ctx.save();
    if (respectMirror && mirror){ ctx.translate(cw,0); ctx.scale(-1,1); }
    ctx.drawImage(video, dx, dy, dw, dh);
    ctx.restore();
  }

  function drawStoredCanvasCover(ctx, sourceCanvas, targetCssW, targetCssH){
    const sw = sourceCanvas.width, sh = sourceCanvas.height;
    const scale = Math.max(targetCssW / sw, targetCssH / sh);
    const dw = sw * scale, dh = sh * scale;
    const dx = (targetCssW - dw) / 2, dy = (targetCssH - dh) / 2;
    ctx.clearRect(0,0,targetCssW,targetCssH);
    ctx.drawImage(sourceCanvas, dx, dy, dw, dh);
  }

  function pushFrameToBuffer(count, score){
    const slot = frameBuffer[frameBufferIndex % frameBuffer.length];
    slot.ctx.clearRect(0,0,slot.canvas.width,slot.canvas.height);
    drawVideoCover(slot.ctx, slot.canvas, true);
    slot.count = count; slot.score = score; slot.ts = performance.now();
    frameBufferIndex++;
  }

  function updateHeldFromBestBufferOrCurrent(currentCount){
    const usable = frameBuffer.filter(f => f.count >= ACTIVE_MIN && f.count <= ACTIVE_MAX);
    if(usable.length){
      usable.sort((a,b) => (b.score - a.score) || (b.count - a.count) || (b.ts - a.ts));
      const best = usable[0];
      drawStoredCanvasCover(freezeCtx, best.canvas, innerWidth, innerHeight);
      thumbCtx.clearRect(0,0,100,146); thumbCtx.drawImage(best.canvas, 0, 0, 100, 146);
      lastHeldCount = best.count; hasHeldFrame = true;
      freezeBadge.textContent = manualLock ? `LOCKED IMAGE · ${lastHeldCount} circles` : `LAST GOOD FRAME · ${lastHeldCount} circles`;
      return true;
    }
    if(currentCount >= ACTIVE_MIN && currentCount <= ACTIVE_MAX){
      drawVideoCover(freezeCtx, freezeCanvas, true);
      thumbCtx.clearRect(0,0,100,146); thumbCtx.drawImage(freezeCanvas, 0, 0, 100, 146);
      lastHeldCount = currentCount; hasHeldFrame = true;
      freezeBadge.textContent = manualLock ? `LOCKED IMAGE · ${lastHeldCount} circles` : `LAST GOOD FRAME · ${lastHeldCount} circles`;
      return true;
    }
    return false;
  }

  function clearHeld(){
    freezeCtx.clearRect(0,0,innerWidth,innerHeight); thumbCtx.clearRect(0,0,100,146);
    armed = true; stableHits = 0; hasHeldFrame = false; lastHeldCount = 0;
    for(const slot of frameBuffer){ slot.count = 0; slot.score = 0; slot.ts = 0; }
    setManualLock(false); setStatus('Held image cleared.'); setBadge(0);
  }

  function resetBoard(){
    setBoardMode = false; boardTapStage = 0; tapA = null; boardRect = null; armed = true; stableHits = 0;
    setStatus('Board reset. Tap Set board and mark the repeater panel again.', '#ffd166');
    centerLabel.textContent = 'BOARD RESET';
  }

  function getBoardInnerRect(board){ return { x: board.x + board.w * BOARD_MARGIN_X, y: board.y + board.h * BOARD_MARGIN_TOP, w: board.w * (1 - BOARD_MARGIN_X*2), h: board.h * (1 - BOARD_MARGIN_TOP - BOARD_MARGIN_BOTTOM) }; }
  function getCellCenter(boardInner, col, row){ return { x: boardInner.x + boardInner.w * (col + 0.5) / COLS, y: boardInner.y + boardInner.h * (row + 0.5) / ROWS }; }
  function getCanvasPointFromClient(clientX, clientY){ const rect = overlay.getBoundingClientRect(); return { x: clientX - rect.left, y: clientY - rect.top }; }

  function sampleCircleStats(img, width, height, cx, cy, r){
    let innerSum = 0, innerN = 0, ringSum = 0, ringN = 0;
    const minX = Math.max(0, Math.floor(cx - r*1.6)), maxX = Math.min(width-1, Math.ceil(cx + r*1.6));
    const minY = Math.max(0, Math.floor(cy - r*1.6)), maxY = Math.min(height-1, Math.ceil(cy + r*1.6));
    for(let y=minY; y<=maxY; y++){
      for(let x=minX; x<=maxX; x++){
        const dx = x - cx, dy = y - cy, d = Math.sqrt(dx*dx + dy*dy);
        const i = (y*width + x) * 4;
        const l = img[i]*0.299 + img[i+1]*0.587 + img[i+2]*0.114;
        if(d <= r){ innerSum += l; innerN++; }
        else if(d <= r*1.35){ ringSum += l; ringN++; }
      }
    }
    return { inner: innerSum / Math.max(1, innerN), ring: ringSum / Math.max(1, ringN) };
  }

  function analyseTemplate(){
    if(!boardRect || !video.videoWidth || !video.videoHeight) return {count:0,score:0,cells:[],board:boardRect};

    actx.save(); actx.clearRect(0,0,analysisCanvas.width,analysisCanvas.height);
    if(mirror){ actx.translate(analysisCanvas.width,0); actx.scale(-1,1); }
    actx.drawImage(video, 0, 0, analysisCanvas.width, analysisCanvas.height);
    actx.restore();

    const frame = actx.getImageData(0,0,analysisCanvas.width,analysisCanvas.height);
    const img = frame.data;

    const boardA = {
      x: boardRect.x / innerWidth * analysisCanvas.width,
      y: boardRect.y / innerHeight * analysisCanvas.height,
      w: boardRect.w / innerWidth * analysisCanvas.width,
      h: boardRect.h / innerHeight * analysisCanvas.height
    };
    const inner = getBoardInnerRect(boardA);
    const baseRadius = Math.min(inner.w / COLS, inner.h / ROWS) * 0.20;
    const radiusOptions = [baseRadius*0.8, baseRadius, baseRadius*1.2, baseRadius*1.45];

    const cells = [];
    let activeCount = 0, totalScore = 0;
    for(let row=0; row<ROWS; row++){
      for(let col=0; col<COLS; col++){
        const c = getCellCenter(inner, col, row);

        let best = null;
        for(const r of radiusOptions){
          const stats = sampleCircleStats(img, analysisCanvas.width, analysisCanvas.height, c.x, c.y, r);
          const delta = stats.inner - stats.ring;
          const score = delta + Math.max(0, stats.inner - 125);
          if(!best || score > best.score){
            best = {r, inner:stats.inner, ring:stats.ring, delta, score};
          }
        }

        const active = best.inner > 138 && best.delta > 20;
        if(active){ activeCount++; totalScore += best.score; }
        cells.push({
          col,row,
          x:c.x/analysisCanvas.width*innerWidth,
          y:c.y/analysisCanvas.height*innerHeight,
          r:best.r/analysisCanvas.width*innerWidth,
          active,
          inner:best.inner,
          ring:best.ring,
          delta:best.delta
        });
      }
    }
    return { count: activeCount, score: totalScore, cells, board: boardRect };
  }

  function drawRoundedRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  }

  function drawOverlay(result){
    octx.clearRect(0,0,innerWidth,innerHeight);

    if(boardRect){
      octx.strokeStyle = 'rgba(255,209,102,.48)'; octx.lineWidth = 2;
      drawRoundedRect(octx, boardRect.x, boardRect.y, boardRect.w, boardRect.h, 14); octx.stroke();
      const inner = getBoardInnerRect(boardRect);
      octx.strokeStyle = 'rgba(124,236,255,.30)'; octx.lineWidth = 1.5;
      drawRoundedRect(octx, inner.x, inner.y, inner.w, inner.h, 12); octx.stroke();
    }

    if(setBoardMode && tapA){
      octx.fillStyle = 'rgba(255,209,102,.95)';
      octx.beginPath(); octx.arc(tapA.x, tapA.y, 6, 0, Math.PI*2); octx.fill();
    }

    for(const cell of result.cells || []){
      octx.beginPath(); octx.arc(cell.x, cell.y, Math.max(8, cell.r), 0, Math.PI*2);
      octx.strokeStyle = cell.active ? 'rgba(110,255,195,.95)' : 'rgba(255,255,255,.14)';
      octx.lineWidth = cell.active ? 2.3 : 1.2; octx.stroke();
      if(cell.active){
        octx.beginPath(); octx.arc(cell.x, cell.y, 3.2, 0, Math.PI*2);
        octx.fillStyle = 'rgba(255,255,255,.98)'; octx.fill();
      }
    }

    const activeCells = (result.cells || []).filter(c => c.active);
    if(activeCells.length){
      const minX = Math.min(...activeCells.map(c => c.x - c.r)), maxX = Math.max(...activeCells.map(c => c.x + c.r));
      const minY = Math.min(...activeCells.map(c => c.y - c.r)), maxY = Math.max(...activeCells.map(c => c.y + c.r));
      const rect = { x:minX-10, y:minY-10, w:(maxX-minX)+20, h:(maxY-minY)+20 };
      octx.strokeStyle = manualLock ? 'rgba(255,179,225,.95)' : 'rgba(124,236,255,.95)';
      octx.lineWidth = 2.5; drawRoundedRect(octx, rect.x, rect.y, rect.w, rect.h, 16); octx.stroke();
      octx.fillStyle = 'rgba(8,14,24,.72)'; octx.fillRect(rect.x+8, rect.y+8, 122, 28);
      octx.fillStyle = manualLock ? '#ffd8f0' : '#dff9ff'; octx.font = '700 14px system-ui';
      octx.fillText('active: ' + result.count, rect.x+18, rect.y+27);
    }
  }

  function tick(){
    const result = analyseTemplate();
    drawOverlay(result);
    setBadge(lastHeldCount || result.count);

    if(result.count >= ACTIVE_MIN && result.count <= ACTIVE_MAX) pushFrameToBuffer(result.count, result.score);

    if(manualLock){
      centerLabel.textContent = 'IMAGE LOCKED';
      centerLabel.style.borderColor = 'rgba(255,179,225,.45)';
      centerLabel.style.color = '#ffd8f0';
      setStatus('Image is locked full screen. Unlock image to go back to scanning.', '#ffb3e1');
      rafId = requestAnimationFrame(tick); return;
    }

    if(!boardRect){
      centerLabel.textContent = setBoardMode ? (boardTapStage === 0 ? 'TAP TOP-LEFT OF BOARD' : 'TAP BOTTOM-RIGHT OF BOARD') : 'SET BOARD';
      centerLabel.style.borderColor = 'rgba(255,209,102,.45)';
      centerLabel.style.color = '#fff0b8';
      setStatus(setBoardMode ? 'Mark the repeater panel corners once. Then it will use the fixed board template.' : 'Tap Set board to start the template detector.', '#ffd166');
      stableHits = 0; rafId = requestAnimationFrame(tick); return;
    }

    if(result.count === 0){
      centerLabel.textContent = 'BOARD LOCKED';
      centerLabel.style.borderColor = 'rgba(255,209,102,.45)';
      centerLabel.style.color = '#fff0b8';
      if(!armed){ armed = true; stableHits = 0; setStatus('Re-armed. Waiting for 4–6 filled cells.', '#ffd166'); }
      else setStatus('Board locked. No filled cells detected.', '#ff8e8e');
      stableHits = 0;
    } else if(result.count < ACTIVE_MIN){
      centerLabel.textContent = 'SEEING FILLED CELLS...';
      centerLabel.style.borderColor = 'rgba(124,236,255,.45)';
      centerLabel.style.color = '#dffaff';
      if(!armed){ armed = true; stableHits = 0; setStatus('Re-armed. Waiting for 4–6 filled cells.', '#ffd166'); }
      else setStatus('Only seeing ' + result.count + ' filled cell' + (result.count === 1 ? '' : 's') + '.', '#ffd166');
      stableHits = 0;
    } else if(result.count > ACTIVE_MAX){
      centerLabel.textContent = 'TOO MANY FILLED CELLS';
      centerLabel.style.borderColor = 'rgba(255,209,102,.45)';
      centerLabel.style.color = '#fff0b8';
      stableHits = 0; setStatus('More than 6 active cells means a false read, ignoring it.', '#ff8e8e');
    } else {
      centerLabel.textContent = 'TEMPLATE LOCKED';
      centerLabel.style.borderColor = 'rgba(124,236,255,.45)';
      centerLabel.style.color = '#dffaff';
      stableHits++; setStatus('Adaptive template detection: ' + result.count + ' filled cells.', '#89ffb3');
      if(armed && stableHits >= 1){
        const ok = updateHeldFromBestBufferOrCurrent(result.count);
        if(ok){ armed = false; stableHits = 0; setStatus('Held image updated from adaptive template detection.', '#89ffb3'); }
        else { stableHits = 0; setStatus('Could not recover a good frame.', '#ff8e8e'); }
      }
    }

    rafId = requestAnimationFrame(tick);
  }

  async function startCamera(){
    stopCamera();
    lastHeldCount = 0; hasHeldFrame = false;
    for(const slot of frameBuffer){ slot.count = 0; slot.score = 0; slot.ts = 0; }
    try{
      stream = await navigator.mediaDevices.getUserMedia({ audio:false, video:{ facingMode:{ ideal:facingMode }, width:{ ideal:1280 }, height:{ ideal:720 } } });
      video.srcObject = stream; await video.play();
      setStatus('Camera live. Adaptive template mode is ready.', '#89ffb3');
      centerLabel.textContent = boardRect ? 'BOARD LOCKED' : 'SET BOARD';
      tick();
    }catch(err){
      console.error(err); setStatus('Camera failed. Use HTTPS and allow camera access.', '#ff8e8e');
    }
  }

  function stopCamera(){
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
  }

  overlay.addEventListener('click', (e) => {
    if(!setBoardMode) return;
    const p = getCanvasPointFromClient(e.clientX, e.clientY);
    if(boardTapStage === 0){
      tapA = p; boardTapStage = 1;
      setStatus('Now tap the bottom-right corner of the repeater panel.', '#ffd166');
      centerLabel.textContent = 'TAP BOTTOM-RIGHT'; return;
    }
    const x1 = Math.min(tapA.x, p.x), y1 = Math.min(tapA.y, p.y), x2 = Math.max(tapA.x, p.x), y2 = Math.max(tapA.y, p.y);
    boardRect = { x:x1, y:y1, w:Math.max(40, x2-x1), h:Math.max(40, y2-y1) };
    setBoardMode = false; boardTapStage = 0; tapA = null; armed = true; stableHits = 0;
    setStatus('Board set. Scanning the fixed 6×5 template inside it now.', '#89ffb3');
    centerLabel.textContent = 'BOARD SET';
  });

  startBtn.addEventListener('click', startCamera);
  setBoardBtn.addEventListener('click', () => {
    setBoardMode = true; boardTapStage = 0; tapA = null;
    setStatus('Tap the top-left corner of the repeater panel.', '#ffd166');
    centerLabel.textContent = 'TAP TOP-LEFT';
  });
  clearBtn.addEventListener('click', clearHeld);
  lockBtn.addEventListener('click', () => {
    if(!manualLock){
      if(!hasHeldFrame){ setStatus('There is no held image to lock yet.', '#ff8e8e'); return; }
      setManualLock(true); setStatus('Image locked full screen.', '#ffb3e1');
    } else {
      setManualLock(false); armed = true; stableHits = 0; setStatus('Unlocked. Back to live scanning.', '#ffd166');
    }
  });
  resetBoardBtn.addEventListener('click', resetBoard);
  flipBtn.addEventListener('click', async () => { facingMode = facingMode === 'environment' ? 'user' : 'environment'; await startCamera(); });
  mirrorBtn.addEventListener('click', () => setMirror(!mirror));
  window.addEventListener('resize', resize);

  resize(); setMirror(false); setManualLock(false); setBadge(0);
})();
</script>
</body>
</html>
